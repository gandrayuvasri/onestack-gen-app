<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0d0d0d; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #111; padding: 40px; border-radius: 15px; width: 350px; box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        h2 { text-align: center; color: #00ffcc; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; outline: none; font-size: 15px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #00ffcc; color: black; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: #00ccaa; }
        p { text-align: center; color: #aaa; }
        a { color: #00ffcc; text-decoration: none; }
        #msg { text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="box">
    <h2>Sign Up</h2>
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <input type="password" id="confirm" placeholder="Confirm Password" />
    <button class="btn" type="button" onclick="signup()">Sign Up</button>
    <div id="msg"></div>
    <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script>
function signup() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirm = document.getElementById("confirm").value.trim();
    const msg = document.getElementById("msg");

    if (!username || !password || !confirm) {
        msg.innerHTML = '<p style="color:orange;">Please fill all fields!</p>';
        return;
    }

    if (password !== confirm) {
        msg.innerHTML = '<p style="color:red;">❌ Passwords do not match!</p>';
        return;
    }

    const users = JSON.parse(localStorage.getItem("users") || "{}");

    if (users[username]) {
        msg.innerHTML = '<p style="color:red;">❌ Username already exists!</p>';
        return;
    }

    users[username] = password;
    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("loggedIn", username);
    msg.innerHTML = '<p style="color:#00ffcc;">✅ Account created! Redirecting...</p>';
    setTimeout(function() { window.location.href = "index.html"; }, 1500);
}
</script>
</body>
</html>

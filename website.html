<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Website Generator</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0d0d0d; color: white; }
        nav { background: #111; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 40px; text-align: center; }
        textarea { width: 60%; height: 120px; border-radius: 10px; padding: 10px; border: none; outline: none; resize: none; font-size: 16px; }
        .btn { padding: 12px 20px; margin-top: 15px; border-radius: 10px; background: #00ffcc; color: black; font-weight: bold; cursor: pointer; border: none; font-size: 16px; }
        .btn:hover { background: #00ccaa; }
        #output { margin-top: 30px; }
        .card { background: #111; padding: 20px; border-radius: 15px; width: 60%; margin: auto; text-align: left; box-shadow: 0 0 15px rgba(0,255,204,0.3); }
        pre { white-space: pre-wrap; font-size: 15px; line-height: 1.6; }
    </style>
</head>
<body>

<nav>
    <h2>Website Generator</h2>
    <button class="btn" type="button" onclick="window.history.back()">Back</button>
</nav>

<div class="container">
    <h1>Generate Your Website</h1>
    <textarea id="userInput" placeholder="Type: portfolio, blog, ecommerce..."></textarea>
    <br>
    <button class="btn" type="button" id="genBtn">Generate</button>
    <div id="output"></div>
</div>

<script>
function downloadResult() {
    var text = document.getElementById("resultText").innerText;
    var blob = new Blob([text], { type: "text/plain" });
    var link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "generated-website.txt";
    link.click();
}

document.getElementById("genBtn").addEventListener("click", function() {
    var prompt = document.getElementById("userInput").value.trim();
    if (!prompt) {
        document.getElementById("output").innerHTML = '<p style="color:orange;">Please enter something!</p>';
        return;
    }
    document.getElementById("output").innerHTML = '<p style="color:#00ffcc;">Generating...</p>';
    fetch("http://127.0.0.1:5000/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: prompt })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
        document.getElementById("output").innerHTML =
            '<div class="card"><h3>Result</h3><pre id="resultText">' + data.result + '</pre><br><button class="btn" type="button" onclick="downloadResult()">⬇ Download Result</button></div>';
    })
    .catch(function(err) {
        document.getElementById("output").innerHTML =
            '<p style="color:red;">Error: ' + err.message + '</p>';
    });
});
</script>

</body>
</html>
